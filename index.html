<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3D3D3D">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Nivelir — Atren Invest</title>
<style>
  :root{
    --brand:#3D3D3D; --brand-dark:#2A2A2A;
    --accent:#EF7C00; --accent-dark:#C96400;
    --plus:#0F7A22; --minus:#C21414; --neutral:#3A3A3A;
    --bg:#FFFFFF; --panel:#EFEFEF; --line:#CCCCCC; --ink:#111111;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{font-family:Arial, Helvetica, sans-serif; background:var(--bg); color:var(--ink); font-weight:700;
    display:flex; flex-direction:column; max-width:560px; margin:0 auto; min-height:100%;}

  /* Glava */
  header{background:var(--brand); color:#fff; display:flex; align-items:center; gap:10px; padding:8px 12px;}
  header .back{font-family:inherit; font-size:24px; font-weight:800; color:#fff; background:transparent; border:0; padding:0 6px; cursor:pointer; display:none;}
  header .logo{height:30px; width:auto; display:block; background:#fff; border-radius:8px; padding:3px 6px;}
  header h1{font-size:20px; margin:0; letter-spacing:1px; font-weight:800; flex:1 1 auto;}
  header .dot{width:12px; height:12px; border-radius:50%; background:#888; flex:0 0 auto;}
  header .dot.ok{background:#37D05A;} header .dot.bad{background:#FF5252;}

  .crumb{background:var(--panel); border-bottom:2px solid var(--line); padding:6px 12px; font-size:13px; color:var(--neutral); font-weight:800; min-height:28px;}
  .crumb b{color:var(--brand);}

  .screen{display:none; flex:1 1 auto; flex-direction:column; min-height:0;}
  .screen.on{display:flex;}

  /* Seznami (projekti/teme) */
  .adder{display:flex; gap:8px; padding:12px;}
  .adder input{flex:1 1 auto; font-family:inherit; font-size:17px; font-weight:800; color:var(--ink);
    border:2px solid var(--line); border-radius:10px; padding:12px; background:#fff;}
  .adder button{font-family:inherit; font-size:16px; font-weight:800; color:#fff; background:var(--accent);
    border:2px solid var(--accent-dark); border-radius:10px; padding:12px 16px; cursor:pointer; white-space:nowrap;}
  .adder button:active{background:var(--accent-dark);}
  .cards{flex:1 1 auto; overflow-y:auto; padding:0 12px 14px;}
  .cards h2{font-size:14px; color:var(--neutral); text-transform:uppercase; letter-spacing:1px; margin:6px 2px;}
  .card{display:flex; align-items:center; justify-content:space-between; background:#fff; border:2px solid var(--line);
    border-left:8px solid var(--brand); border-radius:12px; padding:16px 14px; margin-bottom:10px; cursor:pointer;}
  .card .t{font-size:20px; font-weight:800;}
  .card .t small{display:block; font-size:13px; color:var(--neutral); font-weight:700;}
  .card .go{font-size:26px; color:var(--accent); font-weight:800;}
  .card .edit{font-size:18px; color:var(--brand); background:transparent; border:0; padding:6px 8px; cursor:pointer; font-weight:800;}
  .card .del{font-size:20px; color:var(--minus); background:transparent; border:0; padding:6px 10px; cursor:pointer; font-weight:800;}
  .muted{text-align:center; color:var(--neutral); font-weight:700; padding:24px 10px; font-size:15px;}

  /* Segmentne kontrole */
  .controls{display:flex; gap:8px; padding:8px 12px;}
  .seg{display:flex; flex:1 1 auto; border:2px solid var(--brand); border-radius:10px; overflow:hidden;}
  .seg.mode{flex:2 1 auto;}
  .seg button{flex:1 1 auto; font-family:inherit; font-weight:800; font-size:16px; color:var(--brand); background:#fff;
    border:0; padding:12px 4px; cursor:pointer; border-left:2px solid var(--brand);}
  .seg button:first-child{border-left:0;}
  .seg button.on{background:var(--accent); color:#fff;}
  .nmbtn{flex:0 0 auto; font-family:inherit; font-weight:800; font-size:14px; color:var(--brand); background:#fff;
    border:2px solid var(--brand); border-radius:10px; padding:12px 12px; cursor:pointer;}
  .nmbtn.on{background:var(--accent); border-color:var(--accent-dark); color:#fff;}
  .nmbtn.off{opacity:.5;}

  /* Rezultat */
  .result{flex:0 0 auto; text-align:center; padding:12px 10px 8px; border-top:2px solid var(--line); border-bottom:4px solid var(--line);}
  .result .label{font-size:14px; color:var(--neutral); font-weight:800; text-transform:uppercase; letter-spacing:1px;}
  .result .value{font-size:16vw; line-height:1.02; font-weight:800; margin:2px 0; font-variant-numeric:tabular-nums;}
  @media(min-width:560px){ .result .value{font-size:88px;} }
  .result .value .u{font-size:.42em; color:var(--neutral); margin-left:6px;}
  .result .value.plus{color:var(--plus);} .result .value.minus{color:var(--minus);} .result .value.zero{color:var(--neutral);}
  .result .value.info{color:var(--brand); font-size:30px;} .result .value.info .u{display:none;}
  @media(min-width:560px){ .result .value.info{font-size:36px;} }
  .result .sub{font-size:14px; color:var(--neutral); font-weight:700; min-height:18px;}

  .status{display:flex; justify-content:space-around; background:var(--panel); padding:7px 6px; font-size:14px; border-bottom:2px solid var(--line);}
  .status b{display:block; font-size:19px; color:var(--brand); font-variant-numeric:tabular-nums;}
  .status span{color:var(--neutral); text-transform:uppercase; letter-spacing:.5px; font-size:11px;}

  .refbar{display:block; width:100%; text-align:left; font-family:inherit; font-weight:800; font-size:15px;
    color:var(--ink); background:#FFF6EC; border:0; border-bottom:2px solid var(--line); border-left:8px solid var(--accent);
    padding:9px 12px; cursor:pointer;}
  .refbar:active{background:#FCE9D2;}
  .refbar .rn{color:var(--accent-dark);}
  .refbar .ed{float:right; font-size:12px; color:var(--neutral); font-weight:700;}

  .entry{text-align:center; padding:6px 10px 2px;}
  .entry .hint{font-size:14px; color:var(--brand); font-weight:800; text-transform:uppercase; letter-spacing:.5px; min-height:16px;}
  .entry .ptname{display:none; width:100%; max-width:340px; margin:6px auto 2px; font-family:inherit; font-size:16px; font-weight:700;
    text-align:center; border:2px solid var(--line); border-radius:8px; padding:8px 10px; background:#fff; color:var(--ink);}
  .entry .field{font-size:40px; font-weight:800; letter-spacing:1px; min-height:48px; font-variant-numeric:tabular-nums;
    display:flex; align-items:center; justify-content:center; gap:6px;}
  .entry .field .unit{font-size:20px; color:var(--neutral);}
  .entry .field .sign{font-family:inherit; font-size:28px; font-weight:800; color:#fff; background:var(--brand);
    border:0; border-radius:10px; width:48px; height:48px; cursor:pointer;}
  .entry .field .sign:active{background:var(--accent);}

  .keys{display:grid; grid-template-columns:repeat(3,1fr); gap:7px; padding:6px 10px;}
  .keys button{font-family:inherit; font-size:30px; font-weight:800; color:var(--ink); background:#fff;
    border:3px solid var(--brand); border-radius:12px; padding:12px 0; cursor:pointer; touch-action:manipulation;}
  .keys button:active{background:var(--brand); color:#fff;}
  .keys button.del{color:var(--minus); border-color:var(--minus);}
  .keys button.del:active{background:var(--minus); color:#fff;}
  .keys button.confirm{grid-column:1 / -1; background:var(--accent); border-color:var(--accent-dark); color:#fff;
    font-size:24px; letter-spacing:1px; padding:16px 0;}
  .keys button.confirm:active{background:var(--accent-dark);}

  .list{flex:1 1 auto; overflow-y:auto; padding:2px 10px 10px;}
  .list h2{font-size:13px; color:var(--neutral); text-transform:uppercase; letter-spacing:1px; margin:8px 4px;}

  /* Zgodovina — gumb + drawer ob strani */
  .histbar{padding:6px 10px 0;}
  .histbtn{width:100%; font-family:inherit; font-size:18px; font-weight:800; color:#fff; background:var(--brand);
    border:0; border-radius:12px; padding:14px 0; cursor:pointer;}
  .histbtn:active{background:var(--brand-dark);}
  .histbtn span{background:var(--accent); border-radius:20px; padding:2px 11px; margin-left:6px; font-variant-numeric:tabular-nums;}
  .drawer-ov{position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; z-index:40;}
  .drawer-ov.open{display:block;}
  .drawer{position:fixed; top:0; right:0; height:100%; width:min(92vw,440px); background:#fff; z-index:50;
    transform:translateX(101%); transition:transform .22s ease; display:flex; flex-direction:column; box-shadow:-4px 0 16px rgba(0,0,0,.25);}
  .drawer.open{transform:translateX(0);}
  .drawer-h{display:flex; align-items:center; justify-content:space-between; background:var(--brand); color:#fff; padding:12px 14px; flex:0 0 auto;}
  .drawer-h b{font-size:18px;}
  .drawer-x{font-family:inherit; font-size:24px; font-weight:800; color:#fff; background:transparent; border:0; cursor:pointer; padding:0 6px;}
  .drawer-b{flex:1 1 auto; overflow-y:auto; padding:10px;}
  .drawer-b .muted{padding:24px 10px;}

  /* Modal izbire ob resetu */
  .modal-ov{position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:60; align-items:center; justify-content:center; padding:16px;}
  .modal-ov.open{display:flex;}
  .modal{background:#fff; border-radius:16px; width:100%; max-width:440px; padding:16px; box-shadow:0 8px 30px rgba(0,0,0,.3);}
  .modal>b{font-size:20px; display:block; text-align:center;}
  .modal>p{font-size:14px; color:var(--neutral); text-align:center; margin:6px 0 14px; font-weight:700;}
  .mbtn{display:block; width:100%; font-family:inherit; font-size:18px; font-weight:800; color:#fff; border:0; border-radius:12px; padding:14px; margin-bottom:10px; cursor:pointer; text-align:left;}
  .mbtn small{display:block; font-size:12px; font-weight:700; opacity:.92; margin-top:4px;}
  .mbtn.move{background:var(--brand);}
  .mbtn.move:active{background:var(--brand-dark);}
  .mbtn.wipe{background:var(--minus);}
  .mbtn.wipe:active{background:#9E0F0F;}
  .mcancel{display:block; width:100%; font-family:inherit; font-size:16px; font-weight:800; color:var(--brand); background:#fff; border:2px solid var(--line); border-radius:12px; padding:12px; cursor:pointer;}
  .row{display:flex; align-items:center; justify-content:space-between; background:#fff; border:2px solid var(--line);
    border-left-width:8px; border-radius:10px; padding:10px 12px; margin-bottom:8px;}
  .row.tap{cursor:pointer;}
  .row.ref{border-left-color:var(--brand);} .row.plus{border-left-color:var(--plus);}
  .row.minus{border-left-color:var(--minus);} .row.zero{border-left-color:var(--neutral);}
  .row .lft{display:flex; align-items:center; min-width:0;}
  .row .num{display:inline-flex; align-items:center; justify-content:center; min-width:28px; height:28px; padding:0 7px;
    background:var(--brand); color:#fff; border-radius:14px; font-size:15px; font-weight:800; margin-right:10px; flex:0 0 auto; font-variant-numeric:tabular-nums;}
  .row .num.rf{background:var(--accent);}
  .row .name{font-size:17px; font-weight:800; min-width:0;}
  .row .name small{display:block; font-size:12px; color:var(--neutral); font-weight:700;}
  .row .delta{font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; text-align:right; white-space:nowrap;}
  .row.plus .delta{color:var(--plus);} .row.minus .delta{color:var(--minus);}
  .row.zero .delta{color:var(--neutral);} .row.ref .delta{color:var(--brand);}
  .row .rgt{display:flex; align-items:center; gap:10px;}
  .rowdel{font-family:inherit; font-size:20px; font-weight:800; color:var(--minus); background:#fff;
    border:2px solid var(--minus); border-radius:8px; width:40px; height:40px; cursor:pointer; flex:0 0 auto;}
  .rowdel:active{background:var(--minus); color:#fff;}
  .row.editing{border-color:var(--accent); border-left-color:var(--accent); background:#FFF6EC;}

  .canceledit{display:none; margin:8px auto 0; width:calc(100% - 20px); font-family:inherit; font-size:16px; font-weight:800;
    color:#fff; background:var(--minus); border:0; border-radius:10px; padding:12px 0; cursor:pointer;}
  .canceledit:active{background:#9E0F0F;}

  .reset{padding:6px 10px 14px;}
  .reset button{width:100%; font-family:inherit; font-size:18px; font-weight:800; color:var(--brand-dark); background:#fff;
    border:3px solid var(--brand-dark); border-radius:12px; padding:12px 0; cursor:pointer; letter-spacing:.5px;}
  .reset button:active{background:var(--brand-dark); color:#fff;}
</style>
</head>
<body>

  <header>
    <button class="back" id="backBtn">‹</button>
    <svg class="logo" viewBox="0 0 300 92" xmlns="http://www.w3.org/2000/svg" aria-label="Atren Invest">
      <g fill="#3D3D3D">
        <path fill-rule="evenodd" d="M40,4 L74,78 L6,78 Z M40,36 L58,72 L22,72 Z M32,26 h13 v13 h-13 Z"/>
        <rect x="88" y="30" width="13" height="48"/><rect x="88" y="10" width="13" height="13"/>
      </g>
      <text x="120" y="46" font-family="Arial" font-size="34" font-weight="800" letter-spacing="2" fill="#EF7C00">ATREN</text>
      <text x="122" y="74" font-family="Arial" font-size="20" font-weight="600" letter-spacing="8" fill="#3D3D3D">INVEST</text>
    </svg>
    <h1>Nivelir</h1>
    <span id="ver" style="font-size:10px; font-weight:700; opacity:.6; margin-right:6px;">v260703-1642</span>
    <div class="dot" id="dot" title="Povezava"></div>
  </header>

  <div class="crumb" id="crumb">Projekti</div>

  <!-- ===== ZASLON: Projekti ===== -->
  <section class="screen on" id="screenProjects">
    <div class="adder">
      <input id="projInput" type="text" placeholder="Ime projekta (npr. Vrtec Lucija)" autocomplete="off">
      <button id="projAdd">+ Projekt</button>
    </div>
    <div class="cards" id="projList"><div class="muted">Nalagam…</div></div>
  </section>

  <!-- ===== ZASLON: Teme ===== -->
  <section class="screen" id="screenThemes">
    <div class="adder">
      <input id="themeInput" type="text" placeholder="Ime pozicije (npr. Temelj – os A)" autocomplete="off">
      <button id="themeAdd">+ Pozicija</button>
    </div>
    <div class="cards" id="themeList"></div>
  </section>

  <!-- ===== ZASLON: Meritev ===== -->
  <section class="screen" id="screenLevel">
    <div class="controls">
      <div class="seg unit" id="unitSeg">
        <button data-u="m" class="on">m</button><button data-u="cm">cm</button><button data-u="mm">mm</button>
      </div>
      <div class="seg mode" id="modeSeg">
        <button data-m="measure" class="on">Meritev</button><button data-m="setout">Zakoličba</button>
      </div>
      <button class="nmbtn off" id="elevToggle" title="Prikaz nadmorske višine">n.m.</button>
    </div>

    <div class="result">
      <div class="label" id="resLabel">Referenca</div>
      <div class="value info" id="resValue"><span id="resNum">Vnesi odčitek nazaj</span><span class="u" id="resUnit"></span></div>
      <div class="sub" id="resSub">na referenčni točki (višina 0)</div>
    </div>

    <div class="status">
      <div><span>Horizont vizure</span><b id="stHorizont">—</b></div>
    </div>

    <button class="refbar" id="refBar" style="display:none"></button>

    <div class="entry">
      <div class="hint" id="entryHint">Odčitek nazaj na referenci</div>
      <input class="ptname" id="ptName" type="text" placeholder="Ime točke (neobvezno)" autocomplete="off">
      <div class="field">
        <button class="sign" id="signBtn" style="display:none">+</button>
        <span id="entryVal">0,000</span><span class="unit" id="entryUnit">m</span>
      </div>
    </div>

    <div class="keys" id="keys">
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
      <button data-k=",">,</button><button data-k="0">0</button><button class="del" data-k="del">⌫</button>
      <button class="confirm" data-k="ok" id="btnOk">Potrdi odčitek nazaj</button>
    </div>

    <button class="canceledit" id="cancelEdit">✕ Prekliči urejanje</button>

    <div class="histbar">
      <button class="histbtn" id="histBtn">📋 Seznam točk <span id="histCount">0</span></button>
    </div>

    <div class="reset">
      <button id="btnReset">↻ Nov horizont / reset pozicije</button>
    </div>

    <div class="drawer-ov" id="drawerOv"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer-h"><b id="drawerTitle">Seznam točk</b><button class="drawer-x" id="drawerClose">✕</button></div>
      <div class="drawer-b" id="drawerBody"></div>
    </aside>

    <div class="modal-ov" id="modalOv">
      <div class="modal">
        <b>Nov odčitek nazaj</b>
        <p>Si premaknil nivelir, ali začenjaš znova?</p>
        <button class="mbtn move" id="mMove">↔ Premakni nivelir — nov horizont
          <small>Ista referenca. Točke OSTANEJO, preračunajo se le odčitki late.</small></button>
        <button class="mbtn wipe" id="mWipe">🗑 Nova referenca — izbriši vse
          <small>Pobriše vse točke in postavitev. Začneš z nule.</small></button>
        <button class="mcancel" id="mCancel">Prekliči</button>
      </div>
    </div>
  </section>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL = "https://tlxpgomgjpkzwgazsucp.supabase.co";
const SB_KEY = "sb_publishable_KV0X5I9M6oofyoUqQ6OWiA_64QnTXG8";
const sb = createClient(SB_URL, SB_KEY);

// ===== Stanje =====
let view = "projects";
let project = null;          // {id,name}
let theme = null;            // {id,name,unit,backsight}
let projects = [], themes = [], measurements = [];
let input = "", entrySign = 1, mode = "measure";
let editingId = null;        // id meritve v urejanju
let newHorizon = false;      // vnos novega horizonta (premik nivelirja), točke ostanejo
let elevOn = true;           // prikaz nadmorske višine vklopljen (če je vpisana)
let channel = null;
const TOL = 0.005;
const FACTOR = {m:1, cm:100, mm:1000};
const DEC = {m:3, cm:1, mm:0};

// ===== Pomožne =====
const $ = id => document.getElementById(id);
function U(){ return theme ? theme.unit : "m"; }
function toU(m){ return m * FACTOR[U()]; }
function fromU(v){ return v / FACTOR[U()]; }
function fmt(m){ return toU(m).toFixed(DEC[U()]).replace(".", ","); }
function fmtSigned(m){ return (m>=0?"+":"−") + Math.abs(toU(m)).toFixed(DEC[U()]).replace(".", ","); }
function zeroStr(){ return (0).toFixed(DEC[U()]).replace(".", ","); }
function klass(d){ if(Math.abs(d)<=TOL) return "zero"; return d>0?"plus":"minus"; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function setStatus(ok,txt){ const d=$("dot"); d.className="dot "+(ok?"ok":"bad"); d.title=txt||""; }

// ===== Navigacija =====
function show(v){
  view=v;
  $("screenProjects").className="screen"+(v==="projects"?" on":"");
  $("screenThemes").className="screen"+(v==="themes"?" on":"");
  $("screenLevel").className="screen"+(v==="level"?" on":"");
  $("backBtn").style.display = (v==="projects")?"none":"block";
  let c="Projekti";
  if(v==="themes") c=`<b>${esc(project.name)}</b>`;
  if(v==="level")  c=`${esc(project.name)} › <b>${esc(theme.name)}</b>`;
  $("crumb").innerHTML=c;
}

$("backBtn").onclick=()=>{
  if(view==="level"){ openThemes(project); }
  else if(view==="themes"){ openProjects(); }
};

// ===== Realtime kanal =====
function resub(table, filter, cb){
  if(channel){ sb.removeChannel(channel); channel=null; }
  channel = sb.channel("rt_"+table+"_"+Math.random().toString(36).slice(2))
    .on("postgres_changes", {event:"*", schema:"public", table, filter}, cb)
    .subscribe(st=>{ if(st==="SUBSCRIBED") setStatus(true,"Povezano (živo)"); });
}

// ===== PROJEKTI =====
async function openProjects(){
  project=null; theme=null; show("projects");
  await loadProjects();
  resub("nivelir_projects", undefined, loadProjects);
}
async function loadProjects(){
  const {data,error}=await sb.from("nivelir_projects").select("*").order("created_at");
  if(error){ setStatus(false,"Napaka povezave"); return; }
  setStatus(true,"Povezano"); projects=data||[]; renderProjects();
}
function renderProjects(){
  const el=$("projList");
  if(!projects.length){ el.innerHTML='<div class="muted">Ni še projektov. Dodaj prvega zgoraj.</div>'; return; }
  el.innerHTML="<h2>Projekti</h2>";
  projects.forEach(p=>{
    const c=document.createElement("div"); c.className="card";
    c.innerHTML=`<div class="t">${esc(p.name)}</div><div style="display:flex;align-items:center;gap:2px">
      <button class="edit" data-edit title="Preimenuj">✎</button><button class="del" data-del title="Izbriši">✕</button><span class="go">›</span></div>`;
    c.onclick=()=>openThemes(p);
    c.querySelector("[data-edit]").onclick=e=>{e.stopPropagation(); renameProject(p);};
    c.querySelector("[data-del]").onclick=e=>{e.stopPropagation(); delProject(p);};
    el.appendChild(c);
  });
}
$("projAdd").onclick=addProject;
$("projInput").addEventListener("keydown",e=>{ if(e.key==="Enter") addProject(); });
async function addProject(){
  let name=$("projInput").value.trim();
  if(!name) name="Projekt "+(projects.length+1);
  $("projInput").value=""; $("projInput").blur();
  const {error}=await sb.from("nivelir_projects").insert({name});
  if(error){ alert("Napaka: "+error.message); return; }
  loadProjects();
}
async function delProject(p){
  if(!confirm(`Izbrišem projekt "${p.name}" in vse njegove pozicije in meritve?`)) return;
  await sb.from("nivelir_projects").delete().eq("id",p.id); loadProjects();
}
async function renameProject(p){
  const nn=prompt("Ime projekta:", p.name); if(nn===null) return;
  const name=nn.trim(); if(!name) return;
  const {error}=await sb.from("nivelir_projects").update({name}).eq("id",p.id);
  if(error){ alert("Napaka: "+error.message); return; }
  loadProjects();
}

// ===== TEME =====
async function openThemes(p){
  project=p; theme=null; show("themes");
  await loadThemes();
  resub("nivelir_themes", `project_id=eq.${p.id}`, loadThemes);
}
async function loadThemes(){
  const {data,error}=await sb.from("nivelir_themes").select("*").eq("project_id",project.id).order("created_at");
  if(error){ setStatus(false,"Napaka"); return; }
  setStatus(true,"Povezano"); themes=data||[]; renderThemes();
}
function renderThemes(){
  const el=$("themeList");
  if(!themes.length){ el.innerHTML='<div class="muted">Ni še pozicij. Dodaj prvo zgoraj.</div>'; return; }
  el.innerHTML="<h2>Pozicije</h2>";
  themes.forEach(t=>{
    const c=document.createElement("div"); c.className="card";
    const bs = (t.backsight==null) ? "brez odčitka nazaj" : ("horizont "+t.backsight.toFixed(3).replace(".",",")+" m");
    c.innerHTML=`<div class="t">${esc(t.name)}<small>${bs}</small></div><div style="display:flex;align-items:center;gap:2px">
      <button class="edit" data-edit title="Preimenuj">✎</button><button class="del" data-del title="Izbriši">✕</button><span class="go">›</span></div>`;
    c.onclick=()=>openLevel(t);
    c.querySelector("[data-edit]").onclick=e=>{e.stopPropagation(); renameTheme(t);};
    c.querySelector("[data-del]").onclick=e=>{e.stopPropagation(); delTheme(t);};
    el.appendChild(c);
  });
}
$("themeAdd").onclick=addTheme;
$("themeInput").addEventListener("keydown",e=>{ if(e.key==="Enter") addTheme(); });
async function addTheme(){
  if(!project) return;
  let name=$("themeInput").value.trim();
  if(!name) name="Pozicija "+(themes.length+1);   // vedno ustvari (tudi brez imena)
  $("themeInput").value=""; $("themeInput").blur();
  const {error}=await sb.from("nivelir_themes").insert({project_id:project.id, name, unit:"m"});
  if(error){ alert("Napaka: "+error.message); return; }
  loadThemes();
}
async function delTheme(t){
  if(!confirm(`Izbrišem pozicijo "${t.name}" in vse njene meritve?`)) return;
  await sb.from("nivelir_themes").delete().eq("id",t.id); loadThemes();
}
async function renameTheme(t){
  const nn=prompt("Ime pozicije:", t.name); if(nn===null) return;
  const name=nn.trim(); if(!name) return;
  const {error}=await sb.from("nivelir_themes").update({name}).eq("id",t.id);
  if(error){ alert("Napaka: "+error.message); return; }
  loadThemes();
}

// ===== MERITEV (level) =====
async function openLevel(t){
  theme=Object.assign({},t); input=""; entrySign=1; mode="measure"; editingId=null; newHorizon=false; elevOn=true; show("level");
  await loadMeasurements();
  render();
  // živo: meritve te teme + spremembe same teme (backsight/enota)
  if(channel){ sb.removeChannel(channel); channel=null; }
  channel = sb.channel("rt_level_"+t.id)
    .on("postgres_changes",{event:"*",schema:"public",table:"nivelir_measurements",filter:`theme_id=eq.${t.id}`}, loadMeasurements)
    .on("postgres_changes",{event:"*",schema:"public",table:"nivelir_themes",filter:`id=eq.${t.id}`}, p=>{
        if(p.new){ theme.backsight=p.new.backsight; theme.unit=p.new.unit; theme.ref_name=p.new.ref_name; theme.ref_elevation=p.new.ref_elevation; render(); } })
    .subscribe(st=>{ if(st==="SUBSCRIBED") setStatus(true,"Povezano (živo)"); });
}
async function loadMeasurements(){
  const {data,error}=await sb.from("nivelir_measurements").select("*").eq("theme_id",theme.id).order("created_at");
  if(error){ setStatus(false,"Napaka"); return; }
  setStatus(true,"Povezano"); measurements=data||[]; render();
}
function horizont(){ return theme.backsight; }   // referenca = 0
function refHasElev(){ return !!theme && theme.ref_elevation!=null; }   // je vpisana nadm. višina reference
function hasElev(){ return refHasElev() && elevOn; }                    // ali jo trenutno UPORABLJAMO/prikazujemo
function absM(delta){ return theme.ref_elevation + delta; }            // absolutna nadm. višina točke (m)
function fmtM(m){ return m.toFixed(3).replace(".", ","); }             // nadm. višina VEDNO v metrih (3 decimalke)

// keypad
function effSign(){ return (theme.backsight!=null && mode==="setout" && !newHorizon && !hasElev()) ? entrySign : 1; }
function elevEntry(){ return theme.backsight!=null && mode==="setout" && !newHorizon && hasElev(); }  // vnos = absolutna nadm. višina (m)
function curDec(){ return elevEntry() ? 3 : DEC[U()]; }
function parseInput(){
  if(input===""||input===",") return NaN;
  const v=parseFloat(input.replace(",",".")); if(isNaN(v)) return NaN;
  if(elevEntry()) return v;               // nadm. višina je VEDNO v metrih (brez pretvorbe enote)
  return fromU(v*effSign());
}
function press(k){
  if(k==="del"){ input=input.slice(0,-1); render(); return; }
  if(k==="ok"){ commit(); return; }
  if(k===","){ if(curDec()===0) return; if(input.indexOf(",")===-1) input=(input===""?"0":input)+","; render(); return; }
  if(input==="0") input="";
  const d=input.indexOf(",");
  if(d!==-1 && input.length-d-1>=curDec()) return;
  if(input.replace(",","").length>=9) return;   // dovolj tudi za nadm. višine (npr. 2864,000)
  input+=k; render();
}
function calcRD(v){   // vrne {reading, delta} glede na način; ali null če neveljavno
  if(mode==="measure"){ if(v<0) return null; return {reading:v, delta:horizont()-v}; }
  // zakoličba: če je vpisana nadm. višina reference, je v = ciljna ABSOLUTNA višina
  if(hasElev()){ const delta=v - theme.ref_elevation; return {delta, reading:horizont()-delta}; }
  return {delta:v, reading:horizont()-v};   // sicer v = relativna ciljna višina (±)
}
async function commit(){
  const v=parseInput(); if(isNaN(v)) return;
  const nmField=$("ptName").value.trim();

  // --- Nov horizont (premik nivelirja): ista referenca, točke ostanejo ---
  if(newHorizon){
    if(v<0) return;
    const {error}=await sb.from("nivelir_themes").update({backsight:v}).eq("id",theme.id);
    if(error){ alert("Napaka: "+error.message); return; }
    theme.backsight=v;   // horizont = v (referenca = 0)
    if(measurements.length){
      // delta (višina glede na referenco) ostane; nov odčitek late = horizont - delta
      const res=await Promise.all(measurements.map(m=>
        sb.from("nivelir_measurements").update({reading:v-m.delta}).eq("id",m.id)));
      const bad=res.find(r=>r.error);
      if(bad){ alert("Napaka pri preračunu: "+bad.error.message); }
    }
    newHorizon=false; input=""; render(); await loadMeasurements();
    return;
  }

  // --- Urejanje obstoječe meritve ---
  if(editingId){
    const m=measurements.find(x=>x.id===editingId);
    if(!m){ cancelEdit(); return; }
    const rd=calcRD(v); if(!rd) return;
    const {error}=await sb.from("nivelir_measurements")
      .update({name:nmField||m.name, reading:rd.reading, delta:rd.delta, mode}).eq("id",editingId);
    if(error){ alert("Napaka: "+error.message); return; }
    editingId=null; input=""; $("ptName").value="";   // predznak ostane
    await loadMeasurements();
    return;
  }

  // --- Odčitek nazaj (postavitev reference) ---
  if(theme.backsight==null){
    if(v<0) return;
    const refName=nmField||null;
    const {error}=await sb.from("nivelir_themes").update({backsight:v, ref_name:refName}).eq("id",theme.id);
    if(error){ alert("Napaka: "+error.message); return; }
    theme.backsight=v; theme.ref_name=refName; input=""; $("ptName").value=""; render();
    return;
  }

  // --- Nova točka ---
  const rd=calcRD(v); if(!rd) return;
  const nm=nmField||"Točka "+(measurements.length+1);
  input=""; $("ptName").value="";   // predznak (+/−) ostane za naslednjo točko
  const {error}=await sb.from("nivelir_measurements").insert({theme_id:theme.id, name:nm, reading:rd.reading, delta:rd.delta, mode});
  if(error){ alert("Napaka: "+error.message); return; }
  await loadMeasurements();
}
function startEdit(m){
  closeDrawer();
  editingId=m.id; mode=m.mode;
  if(m.mode==="measure"){ entrySign=1; input=editValStr(m.reading); }
  else if(hasElev()){ entrySign=1; input=fmtM(absM(m.delta)); }   // zakoličba z nadm. višino (m)
  else { entrySign=(m.delta<0?-1:1); input=editValStr(Math.abs(m.delta)); }
  $("ptName").value=m.name;
  render();
  try{ $("screenLevel").scrollTop=0; window.scrollTo(0,0);}catch(e){}
}
function editValStr(meters){ return toU(meters).toFixed(DEC[U()]).replace(".",","); }
function cancelEdit(){ editingId=null; input=""; $("ptName").value=""; render(); }
async function delMeasurement(m){
  if(!confirm(`Izbrišem "${m.name}"?`)) return;
  if(editingId===m.id){ editingId=null; input=""; $("ptName").value=""; }
  const {error}=await sb.from("nivelir_measurements").delete().eq("id",m.id);
  if(error){ alert("Napaka: "+error.message); return; }
  await loadMeasurements();
}
async function renameRef(){
  const nn=prompt("Opis reference (npr. tlak pritličja):", theme.ref_name||"");
  if(nn===null) return;
  const cur = theme.ref_elevation!=null ? String(theme.ref_elevation).replace(".",",") : "";
  const el=prompt("Nadmorska višina reference v METRIH\n(prazno = brez / relativni način):", cur);
  let ref_elevation = theme.ref_elevation;
  if(el!==null){
    const t=el.trim().replace(",",".");
    if(t==="") ref_elevation=null;
    else { const num=parseFloat(t); if(!isNaN(num)) ref_elevation=num; }
  }
  const name=nn.trim()||null;
  const {error}=await sb.from("nivelir_themes").update({ref_name:name, ref_elevation}).eq("id",theme.id);
  if(error){ alert("Napaka: "+error.message); return; }
  theme.ref_name=name; theme.ref_elevation=ref_elevation; elevOn=true; render();
}
async function setUnit(u){
  if(!theme || u===theme.unit) return;
  input=""; theme.unit=u; render();
  await sb.from("nivelir_themes").update({unit:u}).eq("id",theme.id);
}

// ===== Izris meritvenega zaslona =====
function render(){
  if(view!=="level" || !theme) return;
  const us=$("unitSeg").children; for(const b of us) b.className=(b.dataset.u===U()?"on":"");
  const ms=$("modeSeg").children; for(const b of ms) b.className=(b.dataset.m===mode?"on":"");

  const editing = editingId ? measurements.find(m=>m.id===editingId) : null;
  if(editingId && !editing) editingId=null;

  const eEntry=elevEntry();
  $("entryVal").textContent = input===""?(eEntry?"0,000":zeroStr()):input;
  $("entryUnit").textContent = eEntry?"m":U();
  // gumb za preklop prikaza nadmorske višine
  const et=$("elevToggle");
  if(refHasElev()){ et.className="nmbtn"+(elevOn?" on":""); }
  else { et.className="nmbtn off"; }

  $("ptName").style.display = newHorizon ? "none" : "block";
  if(editing) $("ptName").placeholder="Ime točke";
  else if(theme.backsight==null) $("ptName").placeholder="Opis reference (npr. 0,00 = tlak pritličja)";
  else $("ptName").placeholder="Ime točke (neobvezno)";

  const showSign=(theme.backsight!=null && mode==="setout" && !newHorizon && !hasElev());
  $("signBtn").style.display=showSign?"inline-block":"none";
  $("signBtn").textContent=entrySign<0?"−":"+";
  $("cancelEdit").style.display = (editing||newHorizon) ? "block" : "none";
  $("cancelEdit").textContent = newHorizon ? "✕ Prekliči (obdrži star horizont)" : "✕ Prekliči urejanje";

  const nextName="Točka "+(measurements.length+1);
  if(newHorizon){ $("entryHint").textContent="NOV odčitek nazaj — točke ostanejo"; $("btnOk").textContent="Potrdi nov horizont"; }
  else if(editing){ $("entryHint").textContent="Urejam: "+editing.name; $("btnOk").textContent="Shrani spremembo"; }
  else if(theme.backsight==null){ $("entryHint").textContent="Odčitek nazaj + ime reference"; $("btnOk").textContent="Potrdi odčitek nazaj"; }
  else if(mode==="measure"){ $("entryHint").textContent="Odčitek na lati — "+nextName; $("btnOk").textContent="Potrdi "+nextName.toLowerCase(); }
  else if(hasElev()){ $("entryHint").textContent="Ciljna NADM. višina — "+nextName+" (m n.m.)"; $("btnOk").textContent="Izračunaj odčitek"; }
  else{ $("entryHint").textContent="Ciljna višina — "+nextName+" (± glede na ref.)"; $("btnOk").textContent="Izračunaj odčitek"; }

  $("stHorizont").textContent=(theme.backsight==null)?"—":fmt(horizont())+" "+U();

  const rb=$("refBar");
  if(theme.backsight==null){ rb.style.display="none"; }
  else{
    rb.style.display="block";
    const nm=theme.ref_name;
    if(hasElev()){
      rb.innerHTML="📍 Referenca <span class=\"rn\">"+fmtM(theme.ref_elevation)+" m n.m.</span>"+
        (nm?" = "+esc(nm):"")+'<span class="ed">uredi ✎</span>';
    } else {
      const hidden = refHasElev() ? " · n.m. skrita" : "";
      rb.innerHTML="📍 Referenca "+zeroStr()+" "+U()+" = "+
        (nm?'<span class="rn">'+esc(nm)+'</span>':'<span class="rn">brez imena — klikni za vpis</span>')+
        hidden+'<span class="ed">uredi ✎</span>';
    }
  }

  const rl=$("resLabel"), rv=$("resValue"), rn=$("resNum"), ru=$("resUnit"), rs=$("resSub");
  if(newHorizon){
    rl.textContent="Premik nivelirja"; rv.className="value info";
    rn.textContent="Vpiši nov odčitek nazaj"; ru.textContent="";
    rs.textContent="Točke ostanejo, preračunajo se odčitki late";
  } else if(editing){
    rl.textContent="Urejanje — "+editing.name; rv.className="value info";
    rn.textContent="Popravi in shrani"; ru.textContent="";
    rs.textContent=(mode==="measure"?"odčitek late":"ciljna višina")+" • "+(input===""?zeroStr():input)+" "+U();
  } else if(theme.backsight==null){
    rl.textContent="Referenca"; rv.className="value info"; rn.textContent="Vnesi odčitek nazaj"; ru.textContent=""; rs.textContent="na referenčni točki (višina 0)";
  } else if(!measurements.length){
    rl.textContent="Pripravljen"; rv.className="value info";
    rn.textContent=(mode==="measure")?"Meri točke":(hasElev()?"Podaj nadm. višino":"Podaj ciljno višino"); ru.textContent="";
    rs.textContent="Horizont vizure = "+fmt(horizont())+" "+U()+(hasElev()?" ("+fmtM(absM(horizont()))+" m n.m.)":"");
  } else {
    const last=measurements[measurements.length-1];
    const n=measurements.length;
    if(last.mode==="measure"){
      const c=klass(last.delta);
      if(hasElev()){
        rl.textContent="#"+n+" "+last.name+" — nadm. višina"; rv.className="value "+c;
        rn.textContent=fmtM(absM(last.delta)); ru.textContent="m";
        rs.textContent="odčitek "+fmt(last.reading)+" "+U()+" · Δ "+(c==="zero"?"±"+zeroStr():fmtSigned(last.delta))+" "+U();
      } else {
        rl.textContent="#"+n+" "+last.name+" — glede na referenco"; rv.className="value "+c;
        rn.textContent=(c==="zero"?"±"+zeroStr():fmtSigned(last.delta)); ru.textContent=U();
        rs.textContent="odčitek "+fmt(last.reading)+" "+U();
      }
    } else {
      rl.textContent="#"+n+" "+last.name+" — odčitaj na lati:"; rv.className="value info";
      rn.textContent=fmt(last.reading); ru.textContent=U();
      rs.textContent=hasElev()?("za nadm. višino "+fmtM(absM(last.delta))+" m"):("za višino "+fmtSigned(last.delta)+" "+U());
    }
  }
  renderMeasurements();
}
function renderMeasurements(){
  const body=$("drawerBody");
  $("histCount").textContent=measurements.length;
  $("drawerTitle").textContent="Seznam točk"+(theme&&theme.name?" — "+theme.name:"");
  body.innerHTML="";
  if(theme.backsight==null){ body.innerHTML='<div class="muted">Najprej vnesi odčitek nazaj na referenci.</div>'; return; }
  const frag=document.createDocumentFragment();
  const refSub=(hasElev()?"nadm. višina "+fmtM(theme.ref_elevation)+" m · ":"")+"odčitek nazaj "+fmt(theme.backsight)+" "+U()+" · uredi";
  frag.appendChild(mkRow(null,"ref", theme.ref_name||"Referenca", refSub, hasElev()?fmtM(theme.ref_elevation)+" m":zeroStr()));
  if(!measurements.length){
    const m=document.createElement("div"); m.className="muted"; m.textContent="Ni še izmerjenih točk."; frag.appendChild(m);
  }
  measurements.forEach((p,i)=>{
    const c=klass(p.delta);
    let val, sub;
    if(hasElev()){
      val=fmtM(absM(p.delta))+" m";
      sub=(p.mode==="setout"?"zakoličba • odčitaj ":"odčitek ")+fmt(p.reading)+" "+U()+" · Δ "+(c==="zero"?"±"+zeroStr():fmtSigned(p.delta));
    } else {
      val=(c==="zero"?"±"+zeroStr():fmtSigned(p.delta))+" "+U();
      sub=(p.mode==="setout"?"zakoličba • odčitaj ":"odčitek ")+fmt(p.reading)+" "+U();
    }
    frag.appendChild(mkRow(p,c,p.name,sub,val,i+1));
  });
  body.appendChild(frag);
}
function openDrawer(){ $("drawer").classList.add("open"); $("drawerOv").classList.add("open"); }
function closeDrawer(){ $("drawer").classList.remove("open"); $("drawerOv").classList.remove("open"); }
function mkRow(p,cls,name,sub,delta,num){
  const row=document.createElement("div");
  const isEditing = p && editingId===p.id;
  row.className="row "+cls+((p||cls==="ref")?" tap":"")+(isEditing?" editing":"");
  const badge = (num!=null) ? `<span class="num">${num}</span>` : (cls==="ref"?`<span class="num rf">R</span>`:"");
  const right = p
    ? `<div class="rgt"><div class="delta">${delta}</div><button class="rowdel" title="Izbriši">✕</button></div>`
    : `<div class="delta">${delta}</div>`;
  row.innerHTML=`<div class="lft">${badge}<div class="name">${esc(name)}<small>${sub}</small></div></div>${right}`;
  if(p){
    row.querySelector(".name").onclick=()=>startEdit(p);
    row.querySelector(".delta").onclick=()=>startEdit(p);
    row.querySelector(".rowdel").onclick=(e)=>{ e.stopPropagation(); delMeasurement(p); };
  } else if(cls==="ref"){
    row.querySelector(".name").onclick=()=>renameRef();
  }
  return row;
}

// gumb ↻ ponudi izbiro: nov horizont (točke ostanejo) ali izbriši vse
function openModal(){ $("modalOv").classList.add("open"); }
function closeModal(){ $("modalOv").classList.remove("open"); }
function startNewHorizon(){
  closeModal();
  if(theme.backsight==null) return;   // ni horizonta za spremembo
  newHorizon=true; editingId=null; input=""; $("ptName").value=""; render();
  try{ $("screenLevel").scrollTop=0; window.scrollTo(0,0);}catch(e){}
}
async function wipeAll(){
  closeModal();
  if(!confirm("Izbriši VSE točke in postavitev te pozicije?\nZačneš z nule.")) return;
  await sb.from("nivelir_measurements").delete().eq("theme_id",theme.id);
  await sb.from("nivelir_themes").update({backsight:null, ref_name:null}).eq("id",theme.id);
  theme.backsight=null; theme.ref_name=null; input=""; entrySign=1; editingId=null; newHorizon=false; $("ptName").value="";
  await loadMeasurements();
}
function cancelSpecial(){ if(newHorizon){ newHorizon=false; input=""; render(); } else cancelEdit(); }

$("btnReset").onclick=openModal;
$("cancelEdit").onclick=cancelSpecial;
$("mMove").onclick=startNewHorizon;
$("mWipe").onclick=wipeAll;
$("mCancel").onclick=closeModal;
$("modalOv").onclick=(e)=>{ if(e.target.id==="modalOv") closeModal(); };
$("refBar").onclick=renameRef;
$("elevToggle").onclick=()=>{
  if(refHasElev()){ elevOn=!elevOn; input=""; render(); }
  else { renameRef(); }   // ni vpisana → ponudi vpis nadm. višine
};
$("histBtn").onclick=openDrawer;
$("drawerClose").onclick=closeDrawer;
$("drawerOv").onclick=closeDrawer;

// tipkovnica
$("keys").addEventListener("click",e=>{ const b=e.target.closest("button"); if(b) press(b.dataset.k); });
$("signBtn").addEventListener("click",()=>{ entrySign=-entrySign; render(); });
$("unitSeg").addEventListener("click",e=>{ const b=e.target.closest("button"); if(b) setUnit(b.dataset.u); });
$("modeSeg").addEventListener("click",e=>{ const b=e.target.closest("button"); if(b){ if(b.dataset.m!==mode){ mode=b.dataset.m; input=""; render(); } } });
document.addEventListener("keydown",e=>{
  if(view!=="level") return;
  const t=e.target.tagName; if(t==="INPUT"||t==="TEXTAREA") return;
  if(e.key>="0"&&e.key<="9") press(e.key);
  else if(e.key===","||e.key===".") press(",");
  else if(e.key==="-"&&theme.backsight!=null&&mode==="setout"){ entrySign=-entrySign; render(); }
  else if(e.key==="Backspace"){ e.preventDefault(); press("del"); }
  else if(e.key==="Enter"){ e.preventDefault(); press("ok"); }
});

// zagon
openProjects();
</script>
</body>
